<!DOCTYPE html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <title>نموذج تسجيل الطالب</title>
        <style>
            body{
                font-family: 'Tahoma' ,sans-serif;
                background: #f4f6f9;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;

            }
            .container {
                background: white;
                padding: 30px;
                border-radius: 10px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
                width: 400px;

            }
            h2 {
                text-align: center;
                color: #2c3e50;
                margin-bottom: 20px;

            }
            label {
                display: block;
                margin-top: 10px;
                font-weight: bold;
                color: #333;

            }
            input, select {
                width: 100%;
                padding: 10px;
                margin-top: 5px;
                border: 1px solid #ccc;
                border-radius: 6px;
                box-sizing: border-box;

            }
            button {
                width: 100%;
                padding: 12px;
                margin-top: 20px;
                background: #3498db;
                color: white;
                border: none;
                border-radius: 6px;
                font-size: 16px;
                cursor: pointer;

            }
            button:hover {
                background: #2980b9;

            }
            .link {
                text-align: center;
                margin-top: 15px;

            }
            .link a {
                color: #3498db;
                text-decoration: none;
                 
            }

        </style>
    </head>
    <body>
        <div class="container">
            <h2>تسجيل طالب جديد</h2>
            <form action="process.php" method="post">
                <label>اسم الطالب:</label>
                <input type="text" name="name" required>

                <label>البريد الالكتروني:</label>
                <input type="email" name="email" required>

                <label>رقم الطالب:</label>
                <input type="text" name="student_id" required>

                <label>سنة الدراسية:</label>
                <select name="year" required>
                    <option value="">اختار السنة:</option>
                    <option value="السنة الاولى">السنة الاولى</option>
                    <option value="السنة الثانية">السنة الثانية</option>
                    <option value="السنة الثالثة">السنة الثالثة</option>
                    <option value="السنة الرابعة">السنة الرابعة</option>
                </select>
                <label>اسم الدفعة:</label>
                <input type="text" name="batch" required>
                
                <button type="submit">تسجيل</button>
            </form>
            <div class="link">
                <a href="process.php?view=1">عرض الطلاب المسجلين</a>
            </div>
        </div>
    </body>
</html>
